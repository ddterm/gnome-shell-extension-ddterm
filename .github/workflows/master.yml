name: master

concurrency: ${{ github.ref }}

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    with:
      push: true

  pages:
    needs: ci
    runs-on: ubuntu-slim
    timeout-minutes: 5
    if: >-
      ${{
        !cancelled()
        && needs.ci.outputs.dist-tarball-artifact-id
        && needs.ci.outputs.bundle-artifact-id
      }}

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          skip-decompress: true
          merge-multiple: true
          artifact-ids: >-
            ${{ needs.ci.outputs.bundle-artifact-id }},
            ${{ needs.ci.outputs.dist-tarball-artifact-id }},
            ${{ needs.ci.outputs.dist-tarball-checksum-artifact-id }},

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: 'archlinux-package{,-check}'

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: report-*.html
          merge-multiple: true

      - run: >-
          find . -type d -exec
          bash -c 'tree "$0" -h --du -D -H "/${GITHUB_REPOSITORY#*/}/${0:2}" -o "$0/index.html"' '{}'
          ';'

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .
          name: github-pages-${{ github.run_attempt }}

      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages-${{ github.run_attempt }}

  release:
    needs: ci
    runs-on: ubuntu-slim
    timeout-minutes: 5
    if: >-
      ${{
        !cancelled()
        && needs.ci.outputs.dist-tarball-artifact-id
        && needs.ci.outputs.dist-tarball-checksum-artifact-id
        && needs.ci.outputs.bundle-artifact-id
        && needs.ci.outputs.release-notes-artifact-id
        && vars.ENABLE_RELEASES
      }}

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TAG: ${{ needs.ci.outputs.version-tag }}

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          skip-decompress: true
          merge-multiple: true
          artifact-ids: >-
            ${{ needs.ci.outputs.bundle-artifact-id }},
            ${{ needs.ci.outputs.dist-tarball-artifact-id }},
            ${{ needs.ci.outputs.dist-tarball-checksum-artifact-id }},

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: notes
          artifact-ids: ${{ needs.ci.outputs.release-notes-artifact-id }}

      - run: gh release create "$TAG" --draft --notes-file ./notes/* --target "$GITHUB_SHA" ./dist/*
