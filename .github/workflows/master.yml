name: master

concurrency: ${{ github.ref }}

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    with:
      push: true

  pages:
    needs: ci
    if: ${{ !cancelled() }}
    runs-on: ubuntu-slim
    timeout-minutes: 5

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '*.shell-extension.zip'
          skip-decompress: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '{report-*.html,junit-*.xml}'
          merge-multiple: true

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '!{*.shell-extension.zip,report-*.html,junit-*.xml,github-pages-*}'

      - run: >-
          find . -type d -exec
          bash -c 'tree "$0" -h --du -D -H "/${GITHUB_REPOSITORY#*/}/${0:2}" -o "$0/index.html"' '{}'
          ';'

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .
          name: github-pages-${{ github.run_attempt }}

      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
        with:
          artifact_name: github-pages-${{ github.run_attempt }}

  release:
    needs: ci
    if: ${{ !cancelled() }}
    runs-on: ubuntu-slim
    timeout-minutes: 5

    permissions:
      contents: write

    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      TAG: v${{ needs.ci.outputs.version }}

    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: '*.shell-extension.zip'
          skip-decompress: true

      - id: existing
        run: |
          existing="$(gh release list --json tagName | jq -c '[.[].tagName]')"
          echo "existing=$existing" | tee -a "$GITHUB_OUTPUT"

      - run: gh release create "$TAG" --draft --generate-notes --target "$GITHUB_SHA" ./*.shell-extension.zip
        if: ${{ !contains(fromJSON(steps.existing.outputs.existing), env.TAG) }}
