name: Create pull request
description: Create a pull request adding/updating the specified files

inputs:
  app-id:
    description: App ID
    required: true

  private-key:
    description: App private key
    required: true

  title:
    description: Pull request and commit title
    required: true

  description:
    description: Pull request and commit description
    required: false

  files:
    description: List of files/glob patterns to include in the commit and pull request, one per line
    required: true

  branch:
    description: Branch name (without refs/heads/)
    default: ${{ github.job }}
    required: true

runs:
  using: composite
  steps:
    - id: token
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        permission-contents: write
        permission-pull-requests: write

    - id: commit
      uses: amezin/create-commit-action@d2fecc2871c29cd4d0a07b98642f5d63aeef6430 # v2.0.3
      with:
        github-token: ${{ steps.token.outputs.token }}
        files: ${{ inputs.files }}
        message: |
          ${{ inputs.title }}

          ${{ inputs.description }}

    - uses: amezin/create-or-update-git-ref-action@289103670796998ab617ee819d9dd967bbaedb0b # v2.0.3
      with:
        github-token: ${{ steps.token.outputs.token }}
        sha: ${{ steps.commit.outputs.sha }}
        ref: refs/heads/${{ inputs.branch }}
        force: true

    - uses: amezin/create-or-update-pull-request-action@6387138517a626be3f2851610c2bcb4f18f2cf20 # v2.0.2
      with:
        github-token: ${{ steps.token.outputs.token }}
        head: ${{ inputs.branch }}
        title: ${{ inputs.title }}
        body: |
          ${{ inputs.description }}

          Automatically generated pull request, do not edit. Any changes will be overwritten.
