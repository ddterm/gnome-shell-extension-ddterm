name: Run tests in Podman container
description: Run tests in Podman container and upload reports

inputs:
  container:
    description: Container image or service name from tests/compose.yaml
    required: true
  args:
    description: Arguments to pass to the tests

runs:
  using: composite
  steps:
    - shell: bash
      run: tox -e images -- pull "$CONTAINER"
      env:
        CONTAINER: ${{ inputs.container }}

    - id: test
      shell: bash
      run: >-
        tox -e pytest --
        "--html=tests/report-$CONTAINER.html"
        --self-contained-html
        "--junitxml=tests/junit-$CONTAINER.xml"
        "--container=$CONTAINER"
        -vv
        ${{ inputs.args }}
      env:
        CONTAINER: ${{ inputs.container }}

    - if: ${{ always() }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        path: tests/report-${{ inputs.container }}.html
        archive: false

    - if: ${{ always() }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        path: tests/junit-${{ inputs.container }}.xml
        archive: false
